<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topper</title>
    <link rel="stylesheet" href="/style/style.css">
</head>

<body>
    <!-- 버블 섹션 -->
    <div class="bubble-container">
        <div class="bubble">
            <p class="bubble-item">분명 빨래를 하느라</p>
            <p class="bubble-item">일어났던 것 같은데</p>
            <p class="bubble-item">기억이 없네</p>
            <p class="bubble-item">넘넘너머넘</p>
            <p class="bubble-item">기억이 없네</p>
        </div>
    </div>

    <!-- 큰 메시지 섹션 -->
    <div class="large-message">
        <p class="large-item">하고싶나요?</p>
    </div>

    <!-- 배너 -->
    <div class="topper-banner">
        <p class="banner-item">TOPPER</p>
    </div>

    <!-- 네비게이션 -->
    <nav>
        <p class="nav-item active">TOPPER</p>
        <p class="nav-item">Gallery</p>
        <p class="nav-item">지원 폼</p>
        <p class="nav-item">Q&A</p>
    </nav>

    <!-- 메인 섹션 -->
    <main>
        <h1>Member</h1>
        <div class="member-section">
            <div class="tabs">
                <span class="active">1기</span>
                <span>2기</span>
                <span>3기</span>
            </div>
        </div>

        <div class="member-cards">
            <div class="member-card">
                <div class="card-image"></div>
                <p class="member-name">양현서</p>
                <p class="member-position">부장</p>
                <p class="member-mbti">MBTI: ENTP</p>

                <div class="member-information">
                    <ul>
                        <h3>학교 생활</h3>
                        <li>뭔가 있겠지</li>
                        <li>뭔가 있겠지</li>
                    </ul>
                    <ul>
                        <h3>수상</h3>
                        <li>뭔가 있겠지</li>
                        <li>뭔가 있겠지</li>
                    </ul>
                </div>
            </div>

            <!-- 다른 멤버 카드들도 동일한 구조 -->
        </div>
    </main>

    <!-- 플로팅 버튼 -->
    <div class="floating-button">
        <img src="link-icon.png" alt="링크 버튼">
    </div>

</body>

</html>
